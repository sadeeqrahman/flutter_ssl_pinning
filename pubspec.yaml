name: flutter_ssl_pinning
description: A production-ready Flutter plugin for SSL pinning on Android (OkHttp) and iOS (URLSession).
version: 1.0.0

homepage: https://github.com/sadeeqrahman/flutter_ssl_pinning
repository: https://github.com/sadeeqrahman/flutter_ssl_pinning

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.flutter_ssl_pinning
        pluginClass: FlutterSslPinningPlugin
      ios:
        pluginClass: FlutterSslPinningPlugin